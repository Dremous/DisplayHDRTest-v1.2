name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        platform: [x64, x86]
        configuration: [Release, Debug]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Build
      working-directory: ${{ env.GITHUB_WORKSPACE }}
      run: |
        msbuild DisplayHDRComplianceTests.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /p:WindowsTargetPlatformVersion=10.0 /p:PlatformToolset=v143

    - name: Find build outputs
      id: find
      shell: pwsh
      run: |
        $exe = Get-ChildItem -Recurse -Filter "DisplayHDRComplianceTests.exe" | Select-Object -First 1
        if ($exe) {
          Write-Host "Found exe: $($exe.FullName)"
          "EXE_PATH=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          "EXE_DIR=$($exe.DirectoryName)" >> $env:GITHUB_OUTPUT
        } else {
          Write-Host "No exe found"
        }
        $cso = Get-ChildItem -Recurse -Filter "*.cso"
        Write-Host "Found $($cso.Count) .cso files"

    - name: Upload exe
      if: steps.find.outputs.EXE_PATH != ''
      uses: actions/upload-artifact@v4
      with:
        name: DisplayHDRTest-${{ matrix.platform }}-${{ matrix.configuration }}
        path: ${{ steps.find.outputs.EXE_PATH }}
        if-no-files-found: warn

    - name: Upload cso shaders
      uses: actions/upload-artifact@v4
      with:
        name: shaders-${{ matrix.platform }}-${{ matrix.configuration }}
        path: ${{ steps.find.outputs.EXE_DIR }}/*.cso
        if-no-files-found: warn
